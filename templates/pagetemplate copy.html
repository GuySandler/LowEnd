<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/htmx.org"></script>
	<link rel="stylesheet" href="/static/style.css">
	<title>LowEnd</title>
</head>
<body>
	<div id="navbar">
		<div class="green" onclick="window.location.href='/'" style="cursor:pointer;">
			<img src="/static/imgs/HCxp4.png" style="margin-left:20px;height:30px;">
			<button class="navbar-button"
			style="font-family: 'Phantom Sans Bold';letter-spacing: 1px;"
			>Start</button>
		</div>
		<div>
			<button class="navbar-button" onclick="window.location.href='/submit'">Submit</button>
			<button class="navbar-button" onclick="window.location.href='/projects'">Projects</button>
			<button class="navbar-button" onclick="window.location.href='/guide'">Guide</button>
			<button class="navbar-button" onclick="window.location.href='/shop'">Shop</button>
		</div>
		<div id="login-section">
			<button onclick="window.location.href='https://auth.hackclub.com/oauth/authorize?client_id=421396b4a7e853e891b738766586b76a&redirect_uri=http%3A%2F%2Flocalhost%3A8080%2Fapi%2Fauth%2Fcallback&response_type=code&scope=email+name+verification_status+slack_id'" class="navbar-button">Login with Hack Club</button>
		</div>
	</div>
	<script>
		const urlParams = new URLSearchParams(window.location.search);
		if (urlParams.has('slackid')) {
			const slackid = urlParams.get('slackid');
			const name = urlParams.get('name');
			localStorage.setItem('slackid', slackid);
			localStorage.setItem('name', name);
			document.getElementById('login-section').innerHTML = `<span style='padding-right: 10px;'>Logged in as ${name.split(" ")[0]}</span>`;
		}
		else if (localStorage.getItem('slackid') != null) {
			const name = localStorage.getItem('name');
			document.getElementById('login-section').innerHTML = `<span style='padding-right: 10px;'>Logged in as ${name.split(" ")[0]}</span>`;
		}
	</script>
</body>
</html>
